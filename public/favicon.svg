<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <radialGradient id="fvGlobe" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#4a90d9"/>
      <stop offset="55%" stop-color="#1a5bb5"/>
      <stop offset="100%" stop-color="#0d3a7a"/>
    </radialGradient>
    <radialGradient id="fvShine" cx="35%" cy="30%" r="45%">
      <stop offset="0%" stop-color="white" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="fvClip">
      <circle cx="32" cy="32" r="28"/>
    </clipPath>
  </defs>

  <!-- Globe -->
  <circle cx="32" cy="32" r="28" fill="url(#fvGlobe)"/>

  <!-- Continent blobs -->
  <g clip-path="url(#fvClip)" fill="#1e5fa8" opacity="0.55">
    <ellipse cx="24" cy="27" rx="9" ry="6" transform="rotate(-15 24 27)"/>
    <ellipse cx="36" cy="38" rx="7" ry="5" transform="rotate(10 36 38)"/>
    <ellipse cx="42" cy="24" rx="4" ry="6" transform="rotate(-20 42 24)"/>
  </g>

  <!-- Shine -->
  <circle cx="32" cy="32" r="28" fill="url(#fvShine)"/>

  <!-- Red swoosh (bottom) -->
  <path d="M 8 42 Q 32 58 56 42" stroke="#e8192c" stroke-width="4.5" fill="none" stroke-linecap="round"/>
  <!-- White tail -->
  <path d="M 5 38 Q 7 45 14 47" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.9"/>

  <!-- Blue swoosh (top) -->
  <path d="M 8 24 Q 32 10 56 24" stroke="#2979e8" stroke-width="3" fill="none" stroke-linecap="round" stroke-dasharray="2.5 2" opacity="0.6"/>

  <!-- Star -->
  <g transform="translate(50, 14)">
    <path d="M0,-6 L1.2,-1.2 L6,0 L1.2,1.2 L0,6 L-1.2,1.2 L-6,0 L-1.2,-1.2 Z" fill="#2979e8"/>
  </g>
</svg>
