<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <!-- Background -->
  <rect width="1200" height="630" fill="#1a5c2a"/>
  <!-- Gold accent bar -->
  <rect x="0" y="0" width="1200" height="8" fill="#f5c518"/>
  <!-- Kenya flag stripe bottom -->
  <rect x="0" y="614" width="1200" height="6" fill="#c8102e"/>
  <rect x="0" y="620" width="1200" height="4" fill="#1a1a1a"/>
  <rect x="0" y="624" width="1200" height="6" fill="#1a5c2a"/>
  <!-- Decorative circles -->
  <circle cx="1050" cy="120" r="180" fill="rgba(245,197,24,0.08)"/>
  <circle cx="1050" cy="120" r="120" fill="rgba(245,197,24,0.06)"/>
  <!-- Shield watermark -->
  <path d="M80 60 L200 60 Q220 60 220 80 L220 200 Q220 280 140 320 Q60 280 60 200 L60 80 Q60 60 80 60 Z" fill="rgba(255,255,255,0.06)"/>
  <!-- Logo text -->
  <text x="80" y="340" font-family="Arial Black,sans-serif" font-size="140" font-weight="900" fill="white" letter-spacing="-4" opacity="0.95">026NEW</text>
  <text x="88" y="420" font-family="Georgia,serif" font-size="60" font-style="italic" font-weight="700" fill="#f5c518">Blog</text>
  <!-- Tagline -->
  <text x="80" y="490" font-family="Arial,sans-serif" font-size="28" fill="rgba(255,255,255,0.7)" letter-spacing="1">Breaking News · Kenya · Africa · World</text>
  <!-- Flag wave decoration -->
  <path d="M80 530 Q400 550 800 530 Q1000 520 1150 535" stroke="#c8102e" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.8"/>
  <path d="M80 542 Q400 562 800 542 Q1000 532 1150 547" stroke="#1a1a1a" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.5"/>
  <path d="M80 552 Q400 572 800 552 Q1000 542 1150 557" stroke="rgba(255,255,255,0.4)" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.6"/>
</svg>
