<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="026connet!">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff5a5a"/>
      <stop offset="0.55" stop-color="#e23b3b"/>
      <stop offset="1" stop-color="#b71f1f"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Tile -->
  <rect x="16" y="16" width="480" height="480" rx="112" fill="url(#bg)" filter="url(#soft)"/>
  <rect x="16" y="16" width="480" height="480" rx="112" fill="url(#sheen)"/>

  <!-- "026" wordmark -->
  <text x="256" y="246" font-family="Arial, Helvetica, sans-serif" font-size="172" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="-6">026</text>

  <!-- "connet!" connection motif: three linked nodes -->
  <g fill="#ffffff">
    <circle cx="150" cy="330" r="20"/>
    <circle cx="256" cy="362" r="24"/>
    <circle cx="362" cy="330" r="20"/>
  </g>
  <g stroke="#ffffff" stroke-width="11" stroke-linecap="round" opacity="0.95">
    <line x1="168" y1="338" x2="238" y2="356"/>
    <line x1="274" y1="356" x2="344" y2="338"/>
  </g>
  <text x="256" y="430" font-family="Arial, Helvetica, sans-serif" font-size="46" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="-1">connet!</text>
</svg>
