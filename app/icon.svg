<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="026Newsblog">
  <defs>
    <clipPath id="tile">
      <rect width="512" height="512" rx="104" />
    </clipPath>
  </defs>

  <g clip-path="url(#tile)">
    <rect width="512" height="512" fill="#e23b3b" />

    <!-- Kenyan flag accent along the bottom edge -->
    <rect x="0" y="448" width="512" height="16" fill="#0a0a0a" />
    <rect x="0" y="464" width="512" height="8"  fill="#ffffff" />
    <rect x="0" y="472" width="512" height="16" fill="#bb0000" />
    <rect x="0" y="488" width="512" height="8"  fill="#ffffff" />
    <rect x="0" y="496" width="512" height="16" fill="#0a7d3c" />
  </g>

  <!-- 026 wordmark -->
  <text x="256" y="300" font-family="Arial, Helvetica, sans-serif" font-size="190"
        font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="-8">026</text>
</svg>
