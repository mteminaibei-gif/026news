name: Run end to end tests with endform

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    env:
      # Runtime env for the preview server. Mirror the values used in
      # production (Vercel). Secrets are configured in GitHub repo settings.
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      # Endform targets the locally-served app.
      BASE_URL: http://localhost:3000
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Start preview server
        run: npm start &

      - name: Wait for server
        run: npx wait-on http://localhost:3000 --timeout 120000

      - name: Run end to end tests with endform
        run: npx endform@latest test
        env:
          BASE_URL: http://localhost:3000
